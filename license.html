<!DOCTYPE html>
<html>
<head>
  <title>Driving License Profile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f0ff;
      margin: 0;
    }

    .container {
      width: 400px;
      margin: 50px auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      border: 2px solid #003366;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      color: #003366;
    }

    .profile {
      display: flex;
      margin-top: 20px;
    }

    .profile img {
      width: 100px;
      height: 120px;
      border-radius: 5px;
      margin-right: 15px;
      border: 1px solid #ccc;
    }

    .details p {
      margin: 5px 0;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      color: #003366;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: gray;
    }
  </style>

</head>

<body>

  <div class="container">

    <div class="card">

      <!-- Header -->
      <div class="header">
        <h2>Driving License</h2>
        <p>Government of India</p>
      </div>

      <!-- Profile Section -->
      <div class="profile">
        <img src="https://via.placeholder.com/100x120" alt="Photo">

        <div class="details">
          <p><span class="label">Name:</span> Ramesh</p>
          <p><span class="label">DOB:</span> 01-01-2002</p>
          <p><span class="label">License No:</span> KA01 20260012345</p>
          <p><span class="label">Issue Date:</span> 01-01-2026</p>
          <p><span class="label">Expiry Date:</span> 01-01-2036</p>
          <p><span class="label">Vehicle Class:</span> MCWG, LMV</p>
        </div>
      </div>

      <!-- Address -->
      <div class="details" style="margin-top: 15px;">
        <p><span class="label">Address:</span> Bangalore, Karnataka</p>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>This is a demo driving license UI for learning purposes</p>
      </div>

    </div>

  </div>

</body>
</html>
