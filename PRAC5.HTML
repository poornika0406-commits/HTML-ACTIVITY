<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Card Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #1e3a8a, #9333ea);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* CARD CONTAINER */
.card {
  width: 300px;
  height: 200px;
  perspective: 1000px;
}

/* INNER CARD */
.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.8s;
  transform-style: preserve-3d;
  cursor: pointer;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

/* FRONT & BACK */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
  font-size: 1.5rem;
  color: white;
}

/* FRONT SIDE */
.front {
  background: #0ea5e9;
}

/* BACK SIDE */
.back {
  background: #f43f5e;
  transform: rotateY(180deg);
}
</style>
</head>

<body>

<div class="card" onclick="flipCard()">
  <div class="inner" id="cardInner">
    
    <div class="front">
      Click Me 👆
    </div>

    <div class="back">
      Hello 👋 You Found Me!
    </div>

  </div>
</div>

<script>
function flipCard() {
  document.querySelector(".card").classList.toggle("flip");
}
</script>

</body>
</html>
