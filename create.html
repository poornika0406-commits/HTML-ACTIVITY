<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Blog</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #cda4cd;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      background: rgb(67, 5, 38);
      color: rgb(184, 137, 173);
      padding: 15px;
    }

    nav a {
      color: rgb(228, 224, 233);
      margin-left: 15px;
      text-decoration: none;
    }

    /* Blog Section */
    .blogs {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    /* Blog Card */
    .blog-card {
      background: rgb(222, 223, 234);
      padding: 15px;
      width: 280px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      border: none;
      background: crimson;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

  <!-- 🔷 NAVBAR -->
  <nav>
    <h1>Digital Blog</h1>
    <div>
      <a href="#">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
      <a href="create.html">Write Blog</a>
    </div>
  </nav>

  <!-- 🔷 BLOG SECTION -->
  <section class="blogs" id="blogContainer"></section>

  <script>
    // 👉 Get blogs from localStorage
    let blogs = JSON.parse(localStorage.getItem("blogs")) || [];

    let blogContainer = document.getElementById("blogContainer");

    // 👉 Function to display blogs
    function displayBlogs() {
      blogContainer.innerHTML = ""; // clear old content

      blogs.forEach((blog, index) => {
        let div = document.createElement("div");
        div.classList.add("blog-card");

        div.innerHTML = `
          <h3>${blog.title}</h3>
          <p>${blog.content}</p>
          <small>✍️ ${blog.author}</small><br>
          <button onclick="deleteBlog(${index})">Delete</button>
        `;

        blogContainer.appendChild(div);
      });
    }

    // 👉 Delete function
    function deleteBlog(index) {
      if (confirm("Are you sure you want to delete this blog?")) {
        blogs.splice(index, 1);
        localStorage.setItem("blogs", JSON.stringify(blogs));
        displayBlogs();
      }
    }

    // 👉 Load blogs on page load
    displayBlogs();
  </script>

</body>
</html>
