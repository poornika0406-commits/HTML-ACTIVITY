<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Layout Master</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: Arial;
    background: #f4f4f4;
}

/* 🔹 NAVBAR */
nav {
    display: flex;
    justify-content: space-between; /* logo left, links right */
    align-items: center;
    padding: 15px 40px;
    background: #222;
    color: white;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

.nav-links a:hover {
    color: #00d9ff;
}

/* 🔹 BLOG SECTION */
section {
    padding: 40px;
}

/* FLEX CONTAINER */
.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap; /* responsive */
}

/* CARD */
.card {
    background: white;
    width: 300px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 15px;
    flex: 1;
}

.card-content h3 {
    margin-bottom: 10px;
}

.card-content p {
    font-size: 14px;
    color: #555;
}

/* BUTTON */
.card button {
    margin: 15px;
    padding: 10px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.card button:hover {
    background: #00d9ff;
    color: black;
}

/* 🔹 RESPONSIVE NAV */
@media(max-width: 600px) {
    nav {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav>
    <div class="logo">MyBlog</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Blogs</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- 🔹 BLOG CARDS -->
<section>

    <div class="card-container">

        <!-- CARD 1 -->
        <div class="card">
            <img src="https://picsum.photos/300/200?1">
            <div class="card-content">
                <h3>Blog Title 1</h3>
                <p>This is a short description of the blog content.</p>
            </div>
            <button>Read More</button>
        </div>

        <!-- CARD 2 -->
        <div class="card">
            <img src="https://picsum.photos/300/200?2">
            <div class="card-content">
                <h3>Blog Title 2</h3>
                <p>This is a short description of the blog content.</p>
            </div>
            <button>Read More</button>
        </div>

        <!-- CARD 3 -->
        <div class="card">
            <img src="https://picsum.photos/300/200?3">
            <div class="card-content">
                <h3>Blog Title 3</h3>
                <p>This is a short description of the blog content.</p>
            </div>
            <button>Read More</button>
        </div>

    </div>

</section>

</body>
</html>
